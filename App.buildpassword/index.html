<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 정보 생성기</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --border-color: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --error-color: #ef4444;
            --success-color: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--surface-color);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.95rem;
            color: #e2e8f0;
        }

        .form-group label span.required {
            color: var(--error-color);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: #0f172a;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .options-panel {
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .radio-group {
            margin-bottom: 16px;
        }

        .radio-group:last-child {
            margin-bottom: 0;
        }

        .radio-group label.group-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.95rem;
            color: #cbd5e1;
        }

        .radio-options {
            display: flex;
            gap: 24px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.2s;
        }

        .radio-option:hover {
            color: var(--text-primary);
        }

        input[type="radio"] {
            accent-color: var(--accent-color);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: var(--accent-color);
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .error-message {
            color: var(--error-color);
            background: rgba(239, 68, 68, 0.1);
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 0.95rem;
            display: none;
            text-align: center;
        }

        .result-panel {
            margin-top: 24px;
            background: #000;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(163, 255, 163, 0.2);
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .result-row:last-child {
            margin-bottom: 0;
        }

        .result-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            width: 40px;
        }

        .result-value {
            color: #a3ffa3;
            font-family: monospace;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            word-break: break-all;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            width: calc(100% - 60px);
            justify-content: space-between;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
        }

        .copy-btn:active {
            transform: scale(0.98);
        }
        
        .copy-icon {
            font-size: 1.1rem;
            opacity: 0.7;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 12px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1><span>🔐</span> 로그인 정보 생성기</h1>
            <p>조건에 맞는 ID와 패스워드를 자동 생성합니다.</p>
        </div>

        <div class="form-group">
            <label for="genUserId">고객 ID <span class="required">*</span> <span style="color: var(--text-secondary); font-weight: normal; font-size: 0.85rem;">(5글자 이상)</span></label>
            <input type="text" id="genUserId" placeholder="고객 ID를 입력하세요">
        </div>
        
        <div class="form-group">
            <label for="genIpAddr">서버 IP 주소 <span class="required">*</span></label>
            <input type="text" id="genIpAddr" placeholder="예: 192.168.10.55">
        </div>

        <div class="options-panel">
            <div class="radio-group">
                <label class="group-label">비밀번호 접두어</label>
                <div class="radio-options">
                    <label class="radio-option"><input type="radio" name="genPrefix" value="dirn" checked> 야구 (dirn)</label>
                    <label class="radio-option"><input type="radio" name="genPrefix" value="ekffj"> 달러 (ekffj)</label>
                    <label class="radio-option"><input type="radio" name="genPrefix" value="gen1"> gen1 <span style="color: var(--text-secondary); font-size: 0.85rem; opacity: 0.7; font-weight: normal; margin-left: 4px;">(달러)</span></label>
                </div>
            </div>

            <div class="radio-group">
                <label class="group-label">인프라 환경</label>
                <div class="radio-options">
                    <label class="radio-option"><input type="radio" name="genEnv" value="tjqj"> 클라우드 (tjqj)</label>
                    <label class="radio-option"><input type="radio" name="genEnv" value="anffl" checked> 물리 (anffl)</label>
                </div>
            </div>

            <div class="radio-group">
                <label class="group-label">운영체제(OS)</label>
                <div class="radio-options">
                    <label class="radio-option"><input type="radio" name="genOs" value="fl" checked> 리눅스 (fl)</label>
                    <label class="radio-option"><input type="radio" name="genOs" value="dnl"> 윈도우 (dnl)</label>
                </div>
            </div>
        </div>

        <button class="btn" id="generateBtn">ID / 패스워드 생성하기</button>

        <div id="genError" class="error-message"></div>

        <div id="genResult" class="result-panel">
            <div class="result-row">
                <span class="result-label" style="width: 45px;">SSH:</span>
                <button class="copy-btn" id="copySshBtn" title="클릭하여 복사">
                    <span id="resSsh" class="result-value"></span>
                    <span class="copy-icon">📋</span>
                </button>
            </div>
            <div class="divider"></div>
            <div class="result-row">
                <span class="result-label" style="width: 45px;">ID:</span>
                <button class="copy-btn" id="copyIdBtn" title="클릭하여 복사">
                    <span id="resId" class="result-value"></span>
                    <span class="copy-icon">📋</span>
                </button>
            </div>
            <div class="divider"></div>
            <div class="result-row">
                <span class="result-label" style="width: 45px;">PW:</span>
                <button class="copy-btn" id="copyPwBtn" title="클릭하여 복사">
                    <span id="resPw" class="result-value"></span>
                    <span class="copy-icon">📋</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('generateBtn').addEventListener('click', () => {
            const userId = document.getElementById('genUserId').value.trim();
            const ipAddr = document.getElementById('genIpAddr').value.trim();
            
            const prefixEl = document.querySelector('input[name="genPrefix"]:checked');
            const envEl = document.querySelector('input[name="genEnv"]:checked');
            const osEl = document.querySelector('input[name="genOs"]:checked');
            
            const errorBox = document.getElementById('genError');
            const resultBox = document.getElementById('genResult');
            
            errorBox.style.display = 'none';
            resultBox.style.display = 'none';

            if (userId.length < 5) {
                errorBox.innerText = "고객 ID는 5글자 이상 입력해주세요.";
                errorBox.style.display = 'block';
                return;
            }

            if (!ipAddr) {
                errorBox.innerText = "서버 IP 주소를 입력해주세요.";
                errorBox.style.display = 'block';
                return;
            }

            // Extract IP 3rd and 4th octet
            const ipParts = ipAddr.split('.');
            if (ipParts.length !== 4 || ipParts.some(part => isNaN(parseInt(part)) || part === '')) {
                errorBox.innerText = "올바른 IP 주소(예: 192.168.10.55) 형식이 아닙니다.";
                errorBox.style.display = 'block';
                return;
            }
            
            const prefix = prefixEl ? prefixEl.value : '';
            const env = envEl ? envEl.value : '';
            const os = osEl ? osEl.value : '';

            const ipSuffix = ipParts[2] + '.' + ipParts[3];
            const generatedId = "gba" + userId.substring(0, 5);
            const generatedPw = prefix + userId.substring(0, 2) + env + os + ipSuffix + "@@!";
            const generatedSsh = generatedId + "@" + ipAddr;

            document.getElementById('resSsh').innerText = generatedSsh;
            document.getElementById('resId').innerText = generatedId;
            document.getElementById('resPw').innerText = generatedPw;
            resultBox.style.display = 'block';
        });

        // Copy to clipboard logic
        function setupCopy(btnId, valId) {
            document.getElementById(btnId).addEventListener('click', async function() {
                const text = document.getElementById(valId).innerText;
                if (!text) return;
                try {
                    await navigator.clipboard.writeText(text);
                    const icon = this.querySelector('.copy-icon');
                    const originalIcon = icon.innerText;
                    icon.innerText = '✅';
                    setTimeout(() => icon.innerText = originalIcon, 1500);
                } catch (err) {
                    console.error('복사 실패', err);
                    alert('클립보드 복사에 실패했습니다.');
                }
            });
        }
        setupCopy('copySshBtn', 'resSsh');
        setupCopy('copyIdBtn', 'resId');
        setupCopy('copyPwBtn', 'resPw');
    </script>
</body>
</html>
