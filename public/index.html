<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabia Serverless Platform</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/monokai.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/dialog/dialog.min.css">
    
    <!-- CodeMirror JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/dialog/dialog.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/search/searchcursor.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/keymap/vim.min.js"></script>

    <style>
        .CodeMirror {
            height: 400px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.9rem;
            font-family: monospace;
            text-align: left;
        }
        /* 라인 번호 색상 변경 */
        .CodeMirror-linenumber {
            color: #60a5fa !important; /* 밝은 파란색 계열 */
        }
        .CodeMirror-dialog {
            background: var(--surface-color);
            color: var(--text-primary);
            border-top: 1px solid var(--border-color) !important;
            padding: 8px !important;
        }
        .CodeMirror-dialog input {
            background: var(--bg-color);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 4px;
            outline: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- Login Overlay -->
    <div id="loginOverlay" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s;">
        <div style="background: var(--surface-color); padding: 40px; border-radius: 16px; border: 1px solid var(--border-color); text-align: center; box-shadow: var(--shadow-lg); width: 400px; max-width: 90vw;">
            <div style="font-size: 48px; margin-bottom: 16px;">☁️</div>
            <h2 style="margin-bottom: 8px;">가비아 관제도구</h2>
            <p style="color: var(--text-secondary); margin-bottom: 32px;">허가된 사용자만 접근할 수 있습니다.</p>
            <button id="googleLoginBtn" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/><path d="M1 1h22v22H1z" fill="none"/></svg>
                Google 계정으로 로그인
            </button>
            <div id="loginErrorMsg" style="color: #ef4444; margin-top: 16px; font-size: 0.875rem; display: none;">로그인에 실패했습니다.</div>
        </div>
    </div>

    <div class="app-container" style="display: none;" id="mainAppContainer">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="logo">
                <span class="logo-icon">☁️</span>
                <h1>가비아 관제도구</h1>
            </div>
            <div class="topbar-actions">
                <button class="icon-btn" id="settingsBtn" title="환경설정">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
                <button class="btn btn-primary" id="logoutBtn" style="background-color: var(--surface-hover); color: var(--text-primary);">로그아웃</button>
            </div>
        </header>

        <!-- Main Layout -->
        <div class="main-content">
            <!-- Sidebar (App List) -->
            <aside class="sidebar">
                <h2 class="sidebar-title">Applications</h2>
                <ul class="app-list" id="appList">
                    <!-- Apps will be injected by JavaScript -->
                </ul>
            </aside>

            <!-- Content Area (App View) -->
            <main class="content-area">
                <div class="content-wrapper" id="appContent">
                    <div class="empty-state">
                        <div class="empty-icon">👈</div>
                        <h3>앱을 선택해주세요</h3>
                        <p>왼쪽 메뉴에서 앱을 선택하면 이곳에 화면이 나타납니다.</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal for l2.list Editor -->
    <div class="modal-overlay" id="l2ListModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>l2.list 설정 관리</h3>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <div id="l2ListSaveStatus" style="color: #10b981; font-size: 0.875rem;"></div>
                    <button class="btn btn-primary" id="saveL2ListBtn">저장하기</button>
                    <button class="icon-btn" id="closeL2ListModal" style="margin-left: 8px; font-size: 1.2rem;">✕</button>
                </div>
            </div>
            <div class="modal-body" style="position: relative;">
                <textarea id="l2ListEditor" spellcheck="false" style="width: 100%; height: 400px; background: #000; color: #f8fafc; border: 1px solid var(--border-color); border-radius: 8px; padding: 16px; font-family: monospace; font-size: 0.9rem; resize: vertical; outline: none;"></textarea>
                <div id="l2VimStatus" style="position: absolute; bottom: 20px; right: 24px; background: #fbbf24; color: #000; padding: 4px 12px; border-radius: 4px; font-family: monospace; font-weight: bold; font-size: 0.85rem; pointer-events: none; z-index: 10;">-- NORMAL --</div>
            </div>
        </div>
    </div>

    <!-- Modal for ipcheck.list Editor -->
    <div class="modal-overlay" id="ipCheckListModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>IP 체크 리스트 설정 관리</h3>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <div id="ipCheckListSaveStatus" style="color: #10b981; font-size: 0.875rem;"></div>
                    <button class="btn btn-primary" id="saveIpCheckListBtn">저장하기</button>
                    <button class="icon-btn" id="closeIpCheckListModal" style="margin-left: 8px; font-size: 1.2rem;">✕</button>
                </div>
            </div>
            <div class="modal-body" style="position: relative;">
                <textarea id="ipCheckListEditor" spellcheck="false" style="width: 100%; height: 400px; background: #000; color: #f8fafc; border: 1px solid var(--border-color); border-radius: 8px; padding: 16px; font-family: monospace; font-size: 0.9rem; resize: vertical; outline: none;"></textarea>
                <div id="ipCheckVimStatus" style="position: absolute; bottom: 20px; right: 24px; background: #fbbf24; color: #000; padding: 4px 12px; border-radius: 4px; font-family: monospace; font-weight: bold; font-size: 0.85rem; pointer-events: none; z-index: 10;">-- NORMAL --</div>
            </div>
        </div>
    </div>

    <!-- Modal for Login Logs -->
    <div class="modal-overlay" id="loginLogsModal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h3>접속 기록 조회 (최근 100건)</h3>
                <button class="icon-btn" id="closeLoginLogsModal" style="margin-left: 8px; font-size: 1.2rem;">✕</button>
            </div>
            <div class="modal-body" style="max-height: 60vh; overflow-y: auto;">
                <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem;">
                    <thead>
                        <tr style="border-bottom: 1px solid var(--border-color); color: var(--text-secondary);">
                            <th style="padding: 12px 8px;">접속 시간</th>
                            <th style="padding: 12px 8px;">이메일</th>
                            <th style="padding: 12px 8px;">IP 주소</th>
                            <th style="padding: 12px 8px;">접속 환경</th>
                        </tr>
                    </thead>
                    <tbody id="loginLogsTableBody">
                        <!-- Logs will be injected here -->
                    </tbody>
                </table>
                <div id="loginLogsLoading" style="text-align: center; padding: 20px; color: var(--text-secondary);">기록을 불러오는 중...</div>
            </div>
        </div>
    </div>

    <!-- Firebase App (the core Firebase SDK) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, onIdTokenChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        // TODO: 사용자의 Firebase 설정으로 교체해야 합니다.
        const firebaseConfig = {
            apiKey: "AIzaSyCu37Ls_6JWyQaF9e1lS5oO9uOni5QDKnY",
            authDomain: "gabia-serverless-app.firebaseapp.com",
            projectId: "gabia-serverless-app",
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            window.firebaseAuth = auth;
            window.GoogleAuthProvider = GoogleAuthProvider;
            window.signInWithPopup = signInWithPopup;
            window.signOut = signOut;
            window.onAuthStateChanged = onAuthStateChanged;
            window.onIdTokenChanged = onIdTokenChanged;
        } catch(e) {
            console.error("Firebase SDK Load Error:", e);
        }
    </script>
    <script src="app.js?v=9"></script>
</body>
</html>
