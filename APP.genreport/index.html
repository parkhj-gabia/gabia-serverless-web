<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>야간인수인계 보고서</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .report-form {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .form-item {
            flex: 1;
            min-width: 200px;
        }
        .form-item label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }
        .form-item input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-primary);
            outline: none;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-item input:focus {
            border-color: var(--accent-color);
        }
        .pane-container {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            flex: 1;
            min-height: 500px;
        }
        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow-md);
        }
        .pane h4 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .pane textarea {
            flex: 1;
            width: 100%;
            background: #090d16;
            color: #a3ffa3;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            line-height: 1.5;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }
        .pane textarea:focus {
            border-color: var(--accent-color);
        }
        .pane textarea#dailyworkInput {
            color: var(--text-primary);
        }
        .btn-action {
            padding: 0 24px;
            height: 48px;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .copy-success-btn {
            background-color: var(--success-color) !important;
            border-color: var(--success-color) !important;
        }
        @media (max-width: 768px) {
            .pane-container {
                flex-direction: column;
                min-height: auto;
            }
            .pane {
                min-height: 300px;
            }
        }
    </style>
</head>
<body style="background: transparent; min-height: 100vh; padding: 0;">
    <div style="width: 100%; min-height: 100vh; display: flex; flex-direction: column;">
        <div class="app-card" style="display: flex; gap: 24px; justify-content: space-between; align-items: stretch; flex-wrap: wrap;">
            <div style="flex: 2; min-width: 300px; display: flex; flex-direction: column; justify-content: space-between;">
                <div>
                    <h3>📊 야간인수인계 보고서 생성</h3>
                    <p style="color: var(--text-secondary); margin-top: 4px; font-size: 0.9rem;">일일 로그 텍스트를 바탕으로 요약 인수인계 보고서를 자동 포맷팅합니다.</p>
                </div>
                
                <div class="report-form" style="margin-top: 20px;">
                    <div class="form-item">
                        <label for="workerName">야간근무자명 <span style="color: var(--error-color);">*</span></label>
                        <input type="text" id="workerName" value="Benedict" placeholder="예: Benedict, Teddy">
                    </div>
                    <div class="form-item">
                        <label for="reportDate">보고서 기준 날짜 <span style="color: var(--error-color);">*</span></label>
                        <input type="date" id="reportDate">
                    </div>
                    <button class="btn btn-primary btn-action" id="generateBtn" style="margin-bottom: 0;">보고서 생성 ⚡</button>
                </div>
            </div>

            <!-- Memo Card -->
            <div style="flex: 1; min-width: 250px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); border-radius: 8px; padding: 16px; display: flex; flex-direction: column; justify-content: space-between; position: relative;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <span style="font-weight: 600; font-size: 0.9rem; color: var(--accent-color); letter-spacing: 0.05em;">📌 수신부서 메모</span>
                    <button class="btn" id="copyMemoBtn" style="padding: 2px 8px; font-size: 0.75rem; background: rgba(255,255,255,0.08); color: var(--text-primary); height: auto; min-width: auto; font-weight: 500; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1);">복사 📋</button>
                </div>
                <pre id="memoText" style="margin: 0; font-family: 'Courier New', Courier, monospace; font-size: 0.85rem; line-height: 1.4; color: var(--text-secondary); background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); white-space: pre-wrap; word-break: break-all;">인프라운영
정보보호서비스
개발운영팀
기술유닛
AWS기술유닛</pre>
            </div>
        </div>

        <div class="pane-container">
            <!-- Left Pane: Input -->
            <div class="pane">
                <h4>📥 1. 원본 로그 입력 (dailywork.txt)</h4>
                <textarea id="dailyworkInput" placeholder="이곳에 dailywork.txt 파일의 내용을 전체 복사하여 붙여넣으세요..."></textarea>
            </div>

            <!-- Right Pane: Output -->
            <div class="pane" style="position: relative;">
                <h4>
                    <span>📤 2. 생성된 보고서</span>
                    <button class="btn" id="copyBtn" style="padding: 4px 12px; font-size: 0.85rem; background: rgba(255,255,255,0.1); color: var(--text-primary); height: auto; min-width: 90px; font-weight: 500;">복사하기 📋</button>
                </h4>
                <div id="genLoading" style="display: none; position: absolute; top: 60px; right: 40px; color: var(--accent-color); font-weight: bold; font-size: 0.9rem; background: #000; padding: 4px 8px; border-radius: 4px;">생성 중...</div>
                <textarea id="reportOutput" readonly placeholder="보고서 생성 버튼을 누르면 완성된 결과가 여기에 표시됩니다."></textarea>
            </div>
        </div>
    </div>

    <script>
        // Set yesterday's date as default
        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(today.getDate() - 1);
        const yyyy = yesterday.getFullYear();
        const mm = String(yesterday.getMonth() + 1).padStart(2, '0');
        const dd = String(yesterday.getDate()).padStart(2, '0');
        document.getElementById('reportDate').value = `${yyyy}-${mm}-${dd}`;

        const generateBtn = document.getElementById('generateBtn');
        const workerNameInput = document.getElementById('workerName');
        const reportDateInput = document.getElementById('reportDate');
        const dailyworkInput = document.getElementById('dailyworkInput');
        const reportOutput = document.getElementById('reportOutput');
        const genLoading = document.getElementById('genLoading');
        const copyBtn = document.getElementById('copyBtn');

        // Copy functionality
        if (copyBtn && reportOutput) {
            copyBtn.addEventListener('click', async () => {
                const text = reportOutput.value.trim();
                if (!text || text.startsWith("보고서 생성 버튼을 누르면")) return;
                try {
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(text);
                    } else {
                        const textArea = document.createElement("textarea");
                        textArea.value = text;
                        textArea.style.position = "fixed";
                        textArea.style.left = "-9999px";
                        textArea.style.top = "0";
                        document.body.appendChild(textArea);
                        textArea.focus();
                        textArea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textArea);
                    }
                    const originalText = copyBtn.innerHTML;
                    copyBtn.innerHTML = '복사됨 ✅';
                    copyBtn.classList.add('copy-success-btn');
                    setTimeout(() => {
                        copyBtn.innerHTML = originalText;
                        copyBtn.classList.remove('copy-success-btn');
                    }, 1500);
                } catch (err) {
                    alert('복사 실패: ' + err.message);
                }
            });
        }

        // Copy Memo functionality
        const copyMemoBtn = document.getElementById('copyMemoBtn');
        const memoText = document.getElementById('memoText');
        if (copyMemoBtn && memoText) {
            copyMemoBtn.addEventListener('click', async () => {
                const text = memoText.textContent.trim();
                try {
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(text);
                    } else {
                        const textArea = document.createElement("textarea");
                        textArea.value = text;
                        textArea.style.position = "fixed";
                        textArea.style.left = "-9999px";
                        textArea.style.top = "0";
                        document.body.appendChild(textArea);
                        textArea.focus();
                        textArea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textArea);
                    }
                    const originalText = copyMemoBtn.innerHTML;
                    copyMemoBtn.innerHTML = '복사됨 ✅';
                    copyMemoBtn.classList.add('copy-success-btn');
                    setTimeout(() => {
                        copyMemoBtn.innerHTML = originalText;
                        copyMemoBtn.classList.remove('copy-success-btn');
                    }, 1500);
                } catch (err) {
                    alert('복사 실패: ' + err.message);
                }
            });
        }

        // Generate report
        if (generateBtn) {
            generateBtn.addEventListener('click', async () => {
                const workerName = workerNameInput.value.trim();
                const date = reportDateInput.value;
                const dailyworkContent = dailyworkInput.value;

                if (!workerName) {
                    alert("야간근무자명을 입력해주세요.");
                    return;
                }
                if (!date) {
                    alert("보고서 기준 날짜를 입력해주세요.");
                    return;
                }
                if (!dailyworkContent.trim()) {
                    alert("원본 로그 내용을 복사해서 붙여넣어주세요.");
                    return;
                }

                let authToken = null;
                try {
                    if (window.parent && window.parent.getAuthToken) {
                        authToken = await window.parent.getAuthToken();
                    } else {
                        authToken = window.parent ? window.parent.authToken : null;
                    }
                } catch (e) {
                    alert("창 접근 오류: " + e.message);
                    return;
                }

                if (!authToken) {
                    alert("인증 토큰을 찾을 수 없습니다. 새로고침 후 다시 로그인해주세요.");
                    return;
                }

                generateBtn.disabled = true;
                genLoading.style.display = 'block';
                reportOutput.value = "인수인계 보고서를 생성하는 중...";
                reportOutput.style.color = 'var(--text-secondary)';

                try {
                    const response = await fetch('../api/genreport/generate', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${authToken}`
                        },
                        body: JSON.stringify({ workerName, date, dailyworkContent })
                    });
                    const data = await response.json();

                    genLoading.style.display = 'none';

                    if (response.status === 401 || data.error) {
                        reportOutput.value = "오류 발생: " + (data.error || "인증 토큰 오류");
                        reportOutput.style.color = 'var(--error-color)';
                        return;
                    }

                    if (data.success) {
                        reportOutput.value = data.content;
                        reportOutput.style.color = '#a3ffa3';
                    } else {
                        reportOutput.value = "보고서 생성 실패:\n" + (data.message || "알 수 없는 오류");
                        reportOutput.style.color = 'var(--error-color)';
                    }
                } catch (err) {
                    genLoading.style.display = 'none';
                    reportOutput.value = "에러 발생: " + err.message;
                    reportOutput.style.color = 'var(--error-color)';
                } finally {
                    generateBtn.disabled = false;
                }
            });
        }
    </script>
</body>
</html>
