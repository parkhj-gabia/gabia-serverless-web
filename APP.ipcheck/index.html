<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP(TMS/ARP) 조회</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body style="background: transparent; min-height: 100vh;">
    <div style="width: 100%; height: 100%; display: flex; flex-direction: column;">
        <div class="app-card">
            <h3>IP(TMS/ARP) 주소 조회</h3>
            <p style="color: var(--text-secondary); margin-top: 8px;">조회할 IP 주소를 입력해주세요. (예: 182.162.100.15)</p>
            <div style="display: flex; gap: 12px; margin-top: 16px;">
                <input type="text" id="ipCheckInput" placeholder="IP 주소 입력..." style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-primary); outline: none; font-size: 1rem;">
                <button class="btn btn-primary" id="runIpCheckBtn" style="padding: 0 24px; font-weight: 700;">조회 실행</button>
            </div>
        </div>
        <div class="app-card" style="margin-top: 16px; position: relative;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>조회 결과</h3>
            </div>
            <div id="ipCheckLoading" style="display: none; position: absolute; top: 24px; right: 24px; color: var(--accent-color);">조회 중...</div>
            <pre id="ipCheckOutput" style="margin-top: 16px; background: #000; padding: 16px; border-radius: 8px; color: #a3ffa3; font-family: monospace; font-size: 0.9rem; min-height: 100px; overflow-x: auto; white-space: pre-wrap;">조회 결과가 여기에 표시됩니다.</pre>
        </div>
        <div class="app-card" style="margin-top: 16px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h3>ipcheck.list 설정 관리</h3>
                    <p style="color: var(--text-secondary); margin-top: 4px; font-size: 0.9rem;">IP 체크 대상 목록(ipcheck.list)을 새 창에서 수정합니다.</p>
                </div>
                <button class="btn" id="openIpCheckListModalBtn" style="background: var(--surface-hover); color: var(--text-primary);">IP 체크 리스트 수정하기</button>
            </div>
        </div>
    </div>

    <script>
        const runIpCheckBtn = document.getElementById('runIpCheckBtn');
        const ipInput = document.getElementById('ipCheckInput');
        const outputBlock = document.getElementById('ipCheckOutput');
        const loadingIndicator = document.getElementById('ipCheckLoading');
        const openModalBtn = document.getElementById('openIpCheckListModalBtn');

        if (openModalBtn) {
            openModalBtn.addEventListener('click', () => {
                try {
                    if (window.parent && window.parent.openIpCheckListModal) {
                        window.parent.openIpCheckListModal();
                    } else {
                        alert('부모 창에서 리스트 수정 기능을 불러올 수 없습니다.');
                    }
                } catch (e) {
                    alert('CORS 또는 창 접근 오류: ' + e.message);
                }
            });
        }

        if (runIpCheckBtn && ipInput && outputBlock) {
            runIpCheckBtn.addEventListener('click', async () => {
                try {
                    const ip = ipInput.value.trim();
                    if (!ip) {
                        alert("IP 주소를 입력해주세요.");
                        return;
                    }
                    
                    let authToken = null;
                    try {
                        authToken = window.parent ? window.parent.authToken : null;
                    } catch (e) {
                        alert("창 접근 오류: " + e.message);
                        return;
                    }
                    
                    if (!authToken) {
                        alert("인증 토큰을 찾을 수 없습니다. 새로고침 후 다시 로그인해주세요.");
                        return;
                    }
                    
                    runIpCheckBtn.disabled = true;
                    loadingIndicator.style.display = 'block';
                    outputBlock.innerText = `Searching for IP ${ip}...`;
                    outputBlock.style.color = '#a3ffa3';

                    const response = await fetch('../api/check-ip', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${authToken}` 
                        },
                        body: JSON.stringify({ ip })
                    });
                    const data = await response.json();
                    
                    loadingIndicator.style.display = 'none';
                    
                    if (data.success) {
                        outputBlock.innerText = `[Match Found]\nList IP: ${data.ip}\nComment: ${data.comment}`;
                    } else {
                        outputBlock.innerText = data.message || `No match found for IP ${ip}`;
                        outputBlock.style.color = '#ef4444';
                    }
                } catch (err) {
                    loadingIndicator.style.display = 'none';
                    outputBlock.innerText = `Error: ${err.message}`;
                    outputBlock.style.color = '#ef4444';
                    runIpCheckBtn.disabled = false;
                } finally {
                    if (runIpCheckBtn) runIpCheckBtn.disabled = false;
                }
            });

            ipInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') runIpCheckBtn.click();
            });
        }
    </script>
</body>
</html>
